name: MLB Daily Betting Report

on:
  schedule:
    - cron: '0 13 * * *' # Runs daily at 9:00 AM ET
  workflow_dispatch:      # Allows you to run it manually for testing

# This is the "Fix" - it tells the runner to use Node 24 for all steps in this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas pybaseball --upgrade --no-cache-dir

      - name: Run MLB Report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python mlb_betting_daily.py
